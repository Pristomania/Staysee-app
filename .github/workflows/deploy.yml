name: Deploy StaySee

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Normalize nginx script line endings
        run: |
          sed -i 's/\r$//' deploy/nginx/*.sh deploy/nginx/*.conf
          chmod +x deploy/nginx/*.sh

      - name: Copy nginx scripts to VPS
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.STAYSEE_HOST }}
          username: ${{ secrets.STAYSEE_USER }}
          key: ${{ secrets.STAYSEE_SSH_KEY }}
          port: ${{ secrets.STAYSEE_PORT }}
          source: "deploy/nginx/staysee.ru.conf,deploy/nginx/apply-on-vps.sh,deploy/nginx/resolve-web-root.sh"
          target: "/tmp/staysee-nginx/"

      - name: Deploy to VPS
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.STAYSEE_HOST }}
          username: ${{ secrets.STAYSEE_USER }}
          key: ${{ secrets.STAYSEE_SSH_KEY }}
          port: ${{ secrets.STAYSEE_PORT }}
          script: |
            deploy-staysee
            NGINX_SCRIPTS=/tmp/staysee-nginx/deploy/nginx
            chmod +x "$NGINX_SCRIPTS"/*.sh
            sed -i 's/\r$//' "$NGINX_SCRIPTS"/*.sh "$NGINX_SCRIPTS"/*.conf
            STAYSEE_NGINX_SRC="$NGINX_SCRIPTS/staysee.ru.conf"
            test -f "$STAYSEE_NGINX_SRC"
            export STAYSEE_NGINX_SRC
            bash "$NGINX_SCRIPTS/apply-on-vps.sh"
