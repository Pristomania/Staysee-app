name: Deploy StaySee

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Copy nginx scripts to VPS
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.STAYSEE_HOST }}
          username: ${{ secrets.STAYSEE_USER }}
          key: ${{ secrets.STAYSEE_SSH_KEY }}
          port: ${{ secrets.STAYSEE_PORT }}
          source: "deploy/nginx/staysee.ru.conf,deploy/nginx/apply-on-vps.sh,deploy/nginx/resolve-web-root.sh"
          target: "/tmp/staysee-nginx/"

      - name: Deploy to VPS
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.STAYSEE_HOST }}
          username: ${{ secrets.STAYSEE_USER }}
          key: ${{ secrets.STAYSEE_SSH_KEY }}
          port: ${{ secrets.STAYSEE_PORT }}
          script: |
            deploy-staysee
            STAYSEE_NGINX_SRC=/tmp/staysee-nginx/deploy/nginx/staysee.ru.conf \
            bash /tmp/staysee-nginx/deploy/nginx/apply-on-vps.sh
