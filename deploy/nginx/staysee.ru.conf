# StaySee — production Nginx for staysee.ru
# Install: sudo cp deploy/nginx/staysee.ru.conf /etc/nginx/sites-available/staysee
#          sudo ln -sf /etc/nginx/sites-available/staysee /etc/nginx/sites-enabled/staysee
#          sudo nginx -t && sudo systemctl reload nginx

server {
    listen 80;
    listen [::]:80;
    server_name staysee.ru www.staysee.ru;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name staysee.ru www.staysee.ru;

    ssl_certificate     /etc/letsencrypt/live/staysee.ru/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/staysee.ru/privkey.pem;

    root /var/www/staysee/dist;
    index index.html;

    location / {
        try_files $uri $uri/ /index.html;
    }

    location /assets/ {
        expires 7d;
        add_header Cache-Control "public, immutable";
    }

    location /supabase/ {
        proxy_pass https://jnxrildlwvtxhtiwucbt.supabase.co/;
        proxy_ssl_server_name on;
        proxy_ssl_protocols TLSv1.2 TLSv1.3;

        proxy_set_header Host jnxrildlwvtxhtiwucbt.supabase.co;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_http_version 1.1;
        proxy_buffering off;
        proxy_read_timeout 120s;
        proxy_connect_timeout 30s;
        proxy_send_timeout 120s;

        client_max_body_size 4m;
    }

    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
}
