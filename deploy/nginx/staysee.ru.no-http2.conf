# StaySee — iOS Safari debug profile (HTTP/1.1 only, no http2)
# Use when Safari shows "сервер перестал отвечать" but Android works.
#
# Install:
#   sudo cp deploy/nginx/staysee.ru.no-http2.conf /etc/nginx/sites-available/staysee
#   sudo nginx -t && sudo systemctl reload nginx
#
# Revert to staysee.ru.conf after the test.

server {
    listen 80;
    listen [::]:80;
    server_name staysee.ru www.staysee.ru;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl;
    listen [::]:443 ssl;
    server_name staysee.ru www.staysee.ru;

    ssl_certificate     /etc/letsencrypt/live/staysee.ru/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/staysee.ru/privkey.pem;

    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 1d;
    ssl_session_tickets off;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers off;

    gzip on;
    gzip_vary on;
    gzip_min_length 256;
    gzip_types text/plain text/css application/javascript application/json image/svg+xml;

    root @@STAYSEE_WEB_ROOT@@;
    index index.html;

    location / {
        try_files $uri $uri/ /index.html;
    }

    location /assets/ {
        expires 7d;
        add_header Cache-Control "public, immutable";
    }

    location /supabase/ {
        proxy_pass https://jnxrildlwvtxhtiwucbt.supabase.co/;
        proxy_ssl_server_name on;
        proxy_ssl_protocols TLSv1.2 TLSv1.3;

        proxy_set_header Host jnxrildlwvtxhtiwucbt.supabase.co;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_http_version 1.1;
        proxy_buffering off;
        proxy_read_timeout 120s;
        proxy_connect_timeout 30s;
        proxy_send_timeout 120s;

        client_max_body_size 4m;
    }

    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
}
