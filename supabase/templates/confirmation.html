<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Подтверждение email — StaySee AI</title>
</head>
<body style="margin:0;padding:0;background-color:#f5f3ef;font-family:Georgia,'Times New Roman',serif;">
  <table role="presentation" width="100%" cellspacing="0" cellpadding="0" style="background-color:#f5f3ef;padding:32px 16px;">
    <tr>
      <td align="center">
        <table role="presentation" width="100%" cellspacing="0" cellpadding="0" style="max-width:480px;background-color:#faf9f7;border:1px solid #e8e4dc;border-radius:16px;padding:32px 28px;">
          <tr>
            <td align="center" style="padding-bottom:24px;">
              <p style="margin:0;font-size:22px;font-weight:300;letter-spacing:0.04em;color:#3d3a36;">StaySee AI</p>
              <p style="margin:8px 0 0;font-size:11px;font-weight:300;letter-spacing:0.12em;text-transform:uppercase;color:#b8a882;">Точка опоры для осознанной жизни</p>
            </td>
          </tr>
          <tr>
            <td style="font-size:15px;line-height:1.7;color:#4a4743;font-weight:300;">
              <p style="margin:0 0 16px;">Добро пожаловать в StaySee AI.</p>
              <p style="margin:0 0 24px;">Подтвердите email для аккаунта <strong style="font-weight:400;color:#3d3a36;">{{ .Email }}</strong>, чтобы войти в своё пространство.</p>
            </td>
          </tr>
          <tr>
            <td align="center" style="padding-bottom:28px;">
              <a href="{{ .ConfirmationURL }}"
                 style="display:inline-block;padding:14px 28px;background-color:#faf9f7;border:1px solid #d4cfc4;border-radius:12px;color:#3d3a36;text-decoration:none;font-size:14px;letter-spacing:0.08em;font-weight:300;">
                Подтвердить email
              </a>
            </td>
          </tr>
          <tr>
            <td style="font-size:13px;line-height:1.6;color:#8a857c;font-weight:300;">
              <p style="margin:0;">Если вы не регистрировались — проигнорируйте письмо.</p>
            </td>
          </tr>
          <tr>
            <td style="padding-top:28px;border-top:1px solid #ebe7df;font-size:11px;color:#a8a39a;text-align:center;font-weight:300;">
              С заботой, команда StaySee AI
            </td>
          </tr>
        </table>
      </td>
    </tr>
  </table>
</body>
</html>
